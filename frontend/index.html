<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>iConnect — Medical Education Platform</title>

    <!-- PWA / App metadata -->
    <meta name="application-name" content="iConnect" />
    <meta
      name="description"
      content="PG Medical Aspirant Learning Platform by Icon Lifesciences — E-Books, Quizzes, Live Arena, AI Doubt Buster."
    />
    <meta name="theme-color" content="#1E1B4B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iConnect" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192.png" />

    <!-- Favicon & manifest -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!--
      ══════════════════════════════════════════════════════════════
      APP SHELL SPLASH — paints BEFORE JS boots.
      This is the critical "instant load" experience: the user sees
      a branded shell the moment HTML arrives, not a white screen
      waiting for React to hydrate.
      ══════════════════════════════════════════════════════════════
    -->
    <style>
      :root {
        --as-safe-top: env(safe-area-inset-top, 0px);
        --as-safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #f8fafc;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #0f172a;
        }
      }
      #app-shell-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: calc(24px + var(--as-safe-top)) 24px calc(24px + var(--as-safe-bottom));
        background: linear-gradient(135deg, #eef2ff 0%, #f8faff 50%, #f5f3ff 100%);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      @media (prefers-color-scheme: dark) {
        #app-shell-splash {
          background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #1e1b4b 100%);
        }
      }
      #app-shell-splash.as-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .as-logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 34px;
        letter-spacing: -0.02em;
        box-shadow: 0 20px 48px rgba(79, 70, 229, 0.38);
        animation: as-float 2.6s ease-in-out infinite;
      }
      .as-title {
        margin-top: 22px;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #0f172a;
      }
      .as-sub {
        margin-top: 6px;
        font-size: 13px;
        color: #64748b;
        font-weight: 500;
      }
      @media (prefers-color-scheme: dark) {
        .as-title {
          color: #f8fafc;
        }
        .as-sub {
          color: #94a3b8;
        }
      }
      .as-spinner {
        margin-top: 34px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2.5px solid rgba(79, 70, 229, 0.15);
        border-top-color: #4f46e5;
        animation: as-spin 0.85s linear infinite;
      }
      @keyframes as-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes as-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .as-logo,
        .as-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-shell-splash" role="status" aria-label="Loading iConnect">
      <div class="as-logo" aria-hidden="true">i</div>
      <div class="as-title">iConnect</div>
      <div class="as-sub">Medical Education Platform</div>
      <div class="as-spinner" aria-hidden="true"></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide the app shell when React signals it is ready.
      (function () {
        var splash = document.getElementById('app-shell-splash');
        if (!splash) return;
        var hide = function () {
          splash.classList.add('as-hidden');
          setTimeout(function () {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 450);
        };
        window.addEventListener('app-ready', hide, { once: true });
        // Failsafe: never leave a user stuck on the splash.
        setTimeout(hide, 8000);
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
