<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>iConnect — Offline</title>
  <meta name="theme-color" content="#1E1B4B" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #EEF2FF 0%, #F8FAFC 50%, #F5F3FF 100%);
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(24px + var(--safe-top)) 24px calc(24px + var(--safe-bottom));
      min-height: 100dvh;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.08) 0%, transparent 70%);
      top: -150px; right: -100px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.07) 0%, transparent 70%);
      bottom: -100px; left: -80px;
      pointer-events: none;
    }
    .logo {
      width: 88px; height: 88px;
      border-radius: 22px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 48px rgba(79, 70, 229, 0.38);
      position: relative;
      z-index: 1;
    }
    .logo svg { width: 46px; height: 46px; color: white; }
    h1 {
      margin-top: 28px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .sub {
      margin-top: 10px;
      font-size: 15px;
      color: #64748B;
      text-align: center;
      max-width: 340px;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }
    .status-pill {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.12);
      color: #DC2626;
      font-size: 13px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }
    .status-pill.online {
      background: rgba(16, 185, 129, 0.14);
      color: #047857;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .btn {
      margin-top: 28px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #4F46E5, #3730A3);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.32);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      z-index: 1;
      min-height: 48px;
    }
    .btn:active { transform: translateY(1px) scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer {
      margin-top: 36px;
      font-size: 12px;
      color: #94A3B8;
      position: relative;
      z-index: 1;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background: linear-gradient(135deg, #1E1B4B 0%, #0F172A 50%, #1E1B4B 100%);
        color: #F8FAFC;
      }
      .sub { color: #94A3B8; }
      .footer { color: #64748B; }
    }
  </style>
</head>
<body>
  <div class="logo" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h20v14H2z" />
      <path d="M8 21h8M12 17v4" />
    </svg>
  </div>
  <h1>You're offline</h1>
  <p class="sub">iConnect needs an internet connection for live content. Your cached lessons and notes are still available — reconnect to sync your latest activity.</p>
  <div class="status-pill" id="status">
    <span class="dot"></span>
    <span id="status-text">Offline</span>
  </div>
  <button class="btn" id="retry" type="button">Try Again</button>
  <div class="footer">iConnect Medical Education · by Icon Lifesciences</div>

  <script>
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const retryBtn = document.getElementById('retry');

    function updateStatus() {
      if (navigator.onLine) {
        statusEl.classList.add('online');
        statusText.textContent = 'Back online';
        retryBtn.textContent = 'Reload iConnect';
      } else {
        statusEl.classList.remove('online');
        statusText.textContent = 'Offline';
        retryBtn.textContent = 'Try Again';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();

    retryBtn.addEventListener('click', () => {
      retryBtn.disabled = true;
      // If online, do a hard reload; if still offline, fetch / to see if SW can serve
      window.location.href = '/';
    });

    // Auto-reload when connection returns
    window.addEventListener('online', () => {
      setTimeout(() => { window.location.href = '/'; }, 800);
    });
  </script>
</body>
</html>
